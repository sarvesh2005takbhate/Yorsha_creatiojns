[server]
fileWatcherType = "none"
headless         = true
runOnSave        = false
enableCORS       = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[theme]
base                     = "dark"
primaryColor             = "#00D4FF"
backgroundColor          = "#0A0F1E"
secondaryBackgroundColor = "#111827"
textColor                = "#E2E8F0"
font                     = "sans serif"

[client]
showErrorDetails = false
toolbarMode      = "minimal"